services:
  mariadb:
    image: mariadb:11.2
    container_name: onetapai_mariadb
    restart: unless-stopped
    environment:
      # Credentials come from the environment / .env. Dev fallbacks keep local
      # runs zero-config; set strong values in any real deployment.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-onetapai}
      MYSQL_USER: ${DB_USER:-onetapai_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-onetapai_password}
    ports:
      # Bound to loopback so the DB is NOT reachable from the network. The
      # backend runs on the host and connects via localhost. Change the host
      # part (before the first colon) only if you truly need remote access.
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 1G

  qdrant:
    image: qdrant/qdrant:v1.15.1
    container_name: onetapai_qdrant
    restart: unless-stopped
    environment:
      # If set, Qdrant requires this key on every request (sent by the client
      # via config.QDRANT_API_KEY). Empty = no auth (dev default).
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7.2-alpine
    container_name: onetapai_redis
    restart: unless-stopped
    # requirepass empty = no password (dev). Set REDIS_PASSWORD to enforce auth.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-}"]
    ports:
      # Host port is configurable so machines with an existing redis-server on
      # 6379 can use e.g. REDIS_HOST_PORT=6380 (keep REDIS_URL in sync).
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M

  minio:
    image: minio/minio:latest
    container_name: onetapai_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # web console (http://localhost:9001)
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  mariadb_data:
  qdrant_data:
  redis_data:
  minio_data:
